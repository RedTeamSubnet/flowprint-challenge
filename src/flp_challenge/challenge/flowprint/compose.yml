services:
  flowprint-detector:
    image: myhub/flowprint-detector:latest
    build:
      context: .
    restart: unless-stopped
    environment:
      TERM: ${TERM:-xterm}
      TZ: ${TZ:-UTC}
      PORT: ${PORT:-8000}
      PYTHONDONTWRITEBYTECODE: "1"
      FLOWPRINT_TRAINING_PATH: /app/train.py
      FLOWPRINT_TRAINING_CSV_PATH: /data/training.csv
      FLOWPRINT_MODEL_PATH: /tmp/model.json
      FLOWPRINT_TRAINING_TIMEOUT_SECONDS: ${FLOWPRINT_TRAINING_TIMEOUT_SECONDS:-600}
      FLOWPRINT_MODEL_JSON_SIZE_LIMIT: ${FLOWPRINT_MODEL_JSON_SIZE_LIMIT:-20971520}
    volumes:
      - "./src/train.py:/app/train.py:ro"
      - "${FLOWPRINT_TRAINING_CSV_PATH_HOST:-../../../../volumes/storage/flowprint-challenge/data/v2_train_data.csv}:/data/training.csv:ro"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 4g
    cpus: 2
    tty: true
